version: "3.9"

# -----------------------------------------------------------------------------
# Cartelera Planta — docker-compose
#
# Levanta: backend (API + WS + SQLite), admin UI (Nginx), display (Nginx
# servido por el backend), caddy (reverse proxy con TLS interno), middleware.
# -----------------------------------------------------------------------------

services:
  # ---------- Backend ----------
  backend:
    build: ./backend
    container_name: cartelera-backend
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: production
      PORT: 3000
      DB_PATH: /data/cartelera.db
      UPLOADS_DIR: /data/uploads
    volumes:
      - cartelera-data:/data
      - ./display:/display:ro
    expose:
      - "3000"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/api/health').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks: [cartelera]

  # ---------- Admin dashboard (built SPA served by Nginx) ----------
  admin:
    build: ./admin
    container_name: cartelera-admin
    restart: unless-stopped
    expose:
      - "80"
    depends_on:
      - backend
    networks: [cartelera]

  # ---------- Reverse proxy (single entrypoint) ----------
  caddy:
    image: caddy:2-alpine
    container_name: cartelera-caddy
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-8080}:80"
      - "${HTTPS_PORT:-8443}:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
      - ./display:/srv/display:ro
    depends_on:
      - backend
      - admin
    networks: [cartelera]

  # ---------- Middleware: RRHH ----------
  middleware-rrhh:
    build: ./middleware/rrhh-sync
    container_name: cartelera-mw-rrhh
    restart: unless-stopped
    environment:
      PORT: 4001
      REFRESH_MS: 300000
    volumes:
      - ./middleware/rrhh-sync/data:/app/data:ro
    expose:
      - "4001"
    networks: [cartelera]

  # ---------- Middleware: Producción ----------
  middleware-produccion:
    build: ./middleware/produccion-adapter
    container_name: cartelera-mw-produccion
    restart: unless-stopped
    environment:
      PORT: 4002
      REFRESH_MS: 30000
    expose:
      - "4002"
    networks: [cartelera]

  # ---------- Middleware: Seguridad ----------
  middleware-seguridad:
    build: ./middleware/seguridad-feed
    container_name: cartelera-mw-seguridad
    restart: unless-stopped
    environment:
      PORT: 4003
      CARTELERA_URL: http://backend:3000
    expose:
      - "4003"
    depends_on:
      - backend
    networks: [cartelera]

volumes:
  cartelera-data:
    driver: local
  caddy-data:
    driver: local
  caddy-config:
    driver: local

networks:
  cartelera:
    driver: bridge
