<!DOCTYPE html>
<html>
<head>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
<meta http-equiv="X-UA-Compatible" content="IE=8" />
<title>Cartelera Planta TV</title>
<style type="text/css">
html, body {
  width: 100%;
  height: 100%;
  margin: 0;
  padding: 0;
  overflow: hidden;
  background: #10245f;
  color: #ffffff;
  font-family: Arial, Helvetica, sans-serif;
}
#pairing {
  position: absolute;
  left: 0;
  top: 0;
  right: 0;
  bottom: 0;
  text-align: center;
  background: #10245f;
}
#pairbox {
  width: 820px;
  margin: 130px auto 0 auto;
  padding: 50px;
  border: 2px solid #4967b8;
  background: #1f3472;
}
h1 {
  font-size: 70px;
  margin: 0 0 25px 0;
}
p {
  font-size: 30px;
  line-height: 1.3;
}
#code {
  width: 420px;
  height: 70px;
  font-size: 52px;
  text-align: center;
  text-transform: uppercase;
  letter-spacing: 8px;
}
#btn {
  height: 78px;
  margin-left: 20px;
  padding: 0 35px;
  font-size: 34px;
  font-weight: bold;
  color: #ffffff;
  background: #3b82f6;
  border: 0;
}
#msg {
  margin-top: 25px;
  font-size: 28px;
  color: #facc15;
}
#screen {
  display: none;
  position: absolute;
  left: 0;
  top: 0;
  right: 0;
  bottom: 0;
  overflow: hidden;
  background: #10245f;
}
.region {
  position: absolute;
  overflow: hidden;
}
.regionText {
  width: 100%;
  height: 100%;
  display: table;
  text-align: center;
}
.regionCell {
  display: table-cell;
  vertical-align: middle;
  padding: 20px;
}
#fallback {
  display: none;
  position: absolute;
  left: 0;
  top: 0;
  right: 0;
  bottom: 0;
  text-align: center;
  padding-top: 230px;
  font-size: 72px;
  font-weight: bold;
}
#status {
  position: absolute;
  left: 16px;
  bottom: 12px;
  font-size: 20px;
  color: #cbd5e1;
}
</style>
<script type="text/javascript">
(function () {
  var base = window.location.protocol + '//' + window.location.host;
  var tokenKey = 'cartelera.token.tv';
  var displayKey = 'cartelera.displayId.tv';
  var token = null;

  function el(id) { return document.getElementById(id); }

  function xhr() {
    if (window.XMLHttpRequest) return new XMLHttpRequest();
    try { return new ActiveXObject('Microsoft.XMLHTTP'); } catch (e) { return null; }
  }

  function store(key, value) {
    try {
      if (window.localStorage) window.localStorage.setItem(key, value);
    } catch (e) {
      document.cookie = key + '=' + encodeURIComponent(value) + '; path=/';
    }
  }

  function readStore(key) {
    var i, parts, pair;
    try {
      if (window.localStorage) return window.localStorage.getItem(key);
    } catch (e) {}
    parts = document.cookie ? document.cookie.split(';') : [];
    for (i = 0; i < parts.length; i++) {
      pair = parts[i].replace(/^\s+|\s+$/g, '').split('=');
      if (pair[0] === key) return decodeURIComponent(pair[1] || '');
    }
    return null;
  }

  function request(method, url, body, cb) {
    var r = xhr();
    if (!r) {
      cb(0, '');
      return;
    }
    r.open(method, url, true);
    r.onreadystatechange = function () {
      if (r.readyState === 4) cb(r.status, r.responseText || '');
    };
    if (method === 'POST') r.setRequestHeader('Content-Type', 'application/json');
    r.send(body ? body : null);
  }

  function parseJson(text) {
    try {
      if (window.JSON && window.JSON.parse) return window.JSON.parse(text);
    } catch (e1) {}
    try {
      return (new Function('return (' + text + ');'))();
    } catch (e2) {}
    return null;
  }

  function extractString(text, name) {
    var re = new RegExp('"' + name + '"\\s*:\\s*"([^"]+)"');
    var m = re.exec(text || '');
    return m ? m[1] : '';
  }

  function extractNumber(text, name) {
    var re = new RegExp('"' + name + '"\\s*:\\s*([0-9]+)');
    var m = re.exec(text || '');
    return m ? m[1] : '';
  }

  function setMsg(text) {
    el('msg').innerHTML = text;
  }

  function pair() {
    var code = el('code').value || '';
    code = code.replace(/\s+/g, '').toUpperCase();
    el('code').value = code;
    if (code.length !== 6) {
      setMsg('El codigo debe tener 6 caracteres.');
      return false;
    }
    setMsg('Emparejando...');
    request('POST', base + '/api/player/pair', '{"code":"' + code + '","user_agent":"legacy-tv-inline"}', function (status, text) {
      var t, id;
      if (status < 200 || status >= 300) {
        setMsg('No se pudo emparejar. Revisar codigo.');
        return;
      }
      t = extractString(text, 'token');
      id = extractNumber(text, 'display_id');
      if (!t) {
        setMsg('Respuesta invalida del servidor.');
        return;
      }
      token = t;
      store(tokenKey, token);
      store(displayKey, id);
      setMsg('Emparejado. Cargando...');
      loadConfig();
    });
    return false;
  }

  function loadConfig() {
    if (!token) {
      token = readStore(tokenKey);
      if (!token) return;
    }
    request('GET', base + '/api/player/config?token=' + encodeURIComponent(token), null, function (status, text) {
      var data;
      if (status === 401) {
        setMsg('Token vencido. Emparejar nuevamente.');
        return;
      }
      if (status < 200 || status >= 300) {
        setMsg('Sin conexion con API. Estado HTTP ' + status);
        return;
      }
      data = parseJson(text);
      if (!data) {
        showFallback('Conectado');
        return;
      }
      render(data);
    });
  }

  function render(data) {
    var screen = el('screen');
    var regions = el('regions');
    var layout = data.layout;
    var def, vw, vh, ww, wh, sx, sy, scale, contentW, contentH, offsetX, offsetY, i;
    el('pairing').style.display = 'none';
    screen.style.display = 'block';
    regions.innerHTML = '';
    if (!layout || !layout.definition || !layout.definition.regions) {
      showFallback('Sin layout asignado');
      return;
    }
    screen.style.background = layout.background_color || '#10245f';
    def = layout.definition;
    vw = layout.width || 1920;
    vh = layout.height || 1080;
    ww = window.innerWidth || document.documentElement.clientWidth || 1366;
    wh = window.innerHeight || document.documentElement.clientHeight || 768;
    scale = Math.min(ww / vw, wh / vh);
    contentW = Math.round(vw * scale);
    contentH = Math.round(vh * scale);
    offsetX = Math.floor((ww - contentW) / 2);
    offsetY = Math.floor((wh - contentH) / 2);
    sx = scale;
    sy = scale;
    for (i = 0; i < def.regions.length; i++) renderRegion(regions, def.regions[i], sx, sy, offsetX, offsetY);
    el('status').innerHTML = 'Display conectado';
  }

  function renderRegion(parent, r, sx, sy, offsetX, offsetY) {
    var div = document.createElement('div');
    var item = r.items && r.items.length ? r.items[0] : null;
    div.className = 'region';
    div.style.left = Math.round(offsetX + ((r.x || 0) * sx)) + 'px';
    div.style.top = Math.round(offsetY + ((r.y || 0) * sy)) + 'px';
    div.style.width = Math.round((r.w || 100) * sx) + 'px';
    div.style.height = Math.round((r.h || 100) * sy) + 'px';
    parent.appendChild(div);
    if (item && item.type === 'text') renderText(div, item);
    else div.innerHTML = '<div class="regionText"><div class="regionCell">Contenido</div></div>';
  }

  function renderText(div, item) {
    var s = item.style || {};
    div.innerHTML =
      '<div class="regionText" style="' +
      'color:' + (s.color || '#ffffff') + ';' +
      'font-size:' + (s.fontSize || '48px') + ';' +
      'font-weight:' + (s.fontWeight || '700') + ';' +
      'text-align:' + (s.textAlign || 'center') + ';">' +
      '<div class="regionCell">' + escapeHtml(item.text || '') + '</div></div>';
  }

  function showFallback(text) {
    el('pairing').style.display = 'none';
    el('screen').style.display = 'block';
    el('fallback').style.display = 'block';
    el('fallback').innerHTML = text;
  }

  function escapeHtml(v) {
    return String(v).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  }

  window.tvPair = pair;
  window.onload = function () {
    token = readStore(tokenKey);
    if (token) {
      setMsg('Token guardado. Cargando...');
      loadConfig();
    } else {
      try { el('code').focus(); } catch (e) {}
    }
  };
})();
</script>
</head>
<body>
  <div id="pairing">
    <div id="pairbox">
      <h1>Cartelera Planta</h1>
      <p>Ingresar codigo de emparejamiento:</p>
      <form action="#" onsubmit="return tvPair();">
        <input id="code" type="text" maxlength="6" />
        <input id="btn" type="submit" value="Emparejar" onclick="return tvPair();" />
      </form>
      <div id="msg">Listo para emparejar.</div>
    </div>
  </div>
  <div id="screen">
    <div id="regions"></div>
    <div id="fallback"></div>
    <div id="status"></div>
  </div>
</body>
</html>
